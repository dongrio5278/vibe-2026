<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODAY'S PICKS — 오늘의 패션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0c;
      --surface: #131313;
      --border: #222;
      --border-hover: #484848;
      --text-primary: #f0ede8;
      --text-muted: #666;
      --text-dim: #3a3a3a;
      --accent: #c8bfb0;
    }

    html, body { height: 100%; }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      padding: 88px 20px 40px;
    }

    .site-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 7vw, 5.8rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 0.95;
      color: var(--text-primary);
    }

    .site-title em {
      font-style: italic;
      color: var(--accent);
    }

    .site-meta {
      margin-top: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .site-meta span + span::before {
      content: '/';
      margin-right: 28px;
      opacity: 0.3;
    }

    /* ─── ERA FILTER ─── */
    .era-filter {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 40px;
    }

    .era-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 9px 18px;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s, background 0.25s;
      outline: none;
    }

    .era-btn:hover {
      border-color: var(--border-hover);
      color: #aaa;
    }

    .era-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200, 191, 176, 0.04);
    }

    /* ─── SHUFFLE BTN ─── */
    .shuffle-wrap {
      display: flex;
      justify-content: center;
      margin-top: 16px;
    }

    .shuffle-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 12px 26px;
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s;
      outline: none;
    }

    .shuffle-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    .shuffle-btn:disabled { opacity: 0.35; pointer-events: none; }

    .shuffle-btn:hover .shuffle-icon { transform: rotate(180deg); }

    .shuffle-icon {
      font-size: 14px;
      display: inline-block;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ─── DIVIDER ─── */
    .rule {
      display: block;
      width: 1px;
      height: 64px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: 0 auto 64px;
    }

    /* ─── GRID ─── */
    .picks-grid {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 48px 140px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      perspective: 1400px;
      perspective-origin: 50% 30%;
      min-height: 400px;
    }

    /* ─── CARD ─── */
    .card {
      opacity: 0;
      transform: translateY(70px) rotateX(18deg) scale(0.96);
      transform-origin: center 80%;
      transform-style: preserve-3d;
      transition:
        opacity 0.55s cubic-bezier(0.34, 1.42, 0.64, 1),
        transform 0.55s cubic-bezier(0.34, 1.42, 0.64, 1);
      cursor: pointer;
    }

    .card.snap {
      opacity: 1;
      transform: translateY(0) rotateX(0deg) scale(1);
    }

    .card.exit {
      opacity: 0 !important;
      transform: translateY(-28px) scale(0.95) !important;
      transition: opacity 0.28s ease, transform 0.28s ease !important;
    }

    .card-inner {
      border: 2px solid var(--border);
      background: var(--surface);
      transform-style: preserve-3d;
      transition:
        border-color 0.35s ease,
        transform 0.45s cubic-bezier(0.23, 1, 0.32, 1),
        box-shadow 0.45s ease;
    }

    .card:hover .card-inner {
      border-color: var(--border-hover);
      transform: translateY(-10px) rotateX(-4deg) rotateY(2deg);
      box-shadow:
        0 40px 90px rgba(0,0,0,0.72),
        0 12px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* ─── CARD HEADER ─── */
    .card-header {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .card-header-left { flex: 1; }

    .card-brand {
      font-size: 9px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 9px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 400;
      line-height: 1.25;
      color: var(--text-primary);
    }

    .era-badge {
      flex-shrink: 0;
      font-size: 8.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 9px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      margin-top: 2px;
      white-space: nowrap;
    }

    /* era badge color coding */
    .era-badge[data-era="90s"]      { border-color: #3a3530; color: #7a6e64; }
    .era-badge[data-era="00s"]      { border-color: #2e3028; color: #636b55; }
    .era-badge[data-era="10s"]      { border-color: #28303a; color: #556475; }
    .era-badge[data-era="20s"]      { border-color: #302838; color: #6e5580; }
    .era-badge[data-era="Timeless"] { border-color: #2e2e2e; color: #585858; }

    /* ─── IMAGE ─── */
    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3 / 4;
      background: #0a0a0a;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transition: transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
      filter: grayscale(8%) contrast(1.06) brightness(0.94);
    }

    .card:hover .card-img-wrap img { transform: scale(1.06); }

    .card-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }

    .card-index {
      position: absolute;
      top: 14px;
      right: 16px;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.38);
      font-weight: 500;
      z-index: 2;
    }

    /* ─── CARD BODY ─── */
    .card-body { padding: 24px 24px 28px; }

    .card-season {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.6;
      margin-bottom: 13px;
    }

    .card-desc {
      font-size: 12.5px;
      line-height: 1.9;
      color: #727272;
      letter-spacing: 0.01em;
      word-break: keep-all;
    }

    .card-desc strong { color: #b5b5b5; font-weight: 500; }

    .card-tags {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 8.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      transition: border-color 0.3s, color 0.3s;
    }

    .card:hover .tag { border-color: #2e2e2e; color: #4e4e4e; }

    /* ─── POOL COUNTER ─── */
    .pool-counter {
      text-align: center;
      margin-top: -96px;
      margin-bottom: 96px;
      font-size: 9.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      padding: 32px 20px;
      border-top: 1px solid var(--border);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1020px) {
      .picks-grid { grid-template-columns: repeat(2, 1fr); padding: 0 28px 100px; }
    }

    @media (max-width: 640px) {
      .picks-grid { grid-template-columns: 1fr; max-width: 460px; padding: 0 18px 80px; perspective: none; }
      .card { transform: translateY(50px) scale(0.97); }
      .card.snap { transform: translateY(0) scale(1); }
    }
  </style>
</head>

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const grid      = document.getElementById('picksGrid');
const counter   = document.getElementById('poolCounter');
const shuffleBtn = document.getElementById('shuffleBtn');

let activeEra   = 'all';
let cursors     = {}; // per-era cursor

// Date-seeded shuffle
function seededShuffle(arr, seed) {
  const a = [...arr.keys()];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const today   = new Date();
const daySeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

// Per-era shuffled index arrays
const ERAS = ['all', '90s', '00s', '10s', '20s', 'Timeless'];
const shuffledIndexes = {};
ERAS.forEach(era => {
  const indices = POOL
    .map((item, i) => ({ item, i }))
    .filter(({ item }) => era === 'all' || item.era === era)
    .map(({ i }) => i);
  const order = seededShuffle(indices, daySeed + era.charCodeAt(0));
  shuffledIndexes[era] = order;
  cursors[era] = 0;
});

function getNextThree() {
  const pool  = shuffledIndexes[activeEra];
  const items = [];
  for (let i = 0; i < 3; i++) {
    items.push(POOL[pool[(cursors[activeEra] + i) % pool.length]]);
  }
  cursors[activeEra] = (cursors[activeEra] + 3) % pool.length;
  return items;
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function buildCard(item, num) {
  const lines = item.name.split('\n');
  const el = document.createElement('article');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-inner">
      <div class="card-header">
        <div class="card-header-left">
          <p class="card-brand">${item.brand}</p>
          <h2 class="card-name">${lines.join('<br>')}</h2>
        </div>
        <span class="era-badge" data-era="${item.era}">${item.era}</span>
      </div>
      <div class="card-img-wrap">
        <img src="${item.img}" alt="${item.brand} — ${lines[0]}" loading="lazy" />
        <span class="card-index">0${num}</span>
      </div>
      <div class="card-body">
        <p class="card-season">${item.season}</p>
        <p class="card-desc">${item.desc}</p>
        <div class="card-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>`;
  return el;
}

function snapIn(cards) {
  cards.forEach((card, i) => {
    grid.appendChild(card);
    requestAnimationFrame(() => {
      setTimeout(() => card.classList.add('snap'), i * 300 + 20);
    });
  });
}

function renderItems(items) {
  const cards = items.map((item, i) => buildCard(item, i + 1));
  snapIn(cards);
  attachTilt(cards);
  updateCounter();
}

function updateCounter() {
  const pool  = shuffledIndexes[activeEra];
  const cur   = cursors[activeEra];
  const shown = cur === 0 ? pool.length : cur;
  counter.textContent = `${shown} / ${pool.length} items viewed`;
}

/* ══════════════════════════════════════════
   TILT
══════════════════════════════════════════ */
function attachTilt(cards) {
  cards.forEach(card => {
    const inner = card.querySelector('.card-inner');
    card.addEventListener('mousemove', e => {
      const r  = card.getBoundingClientRect();
      const rx = ((e.clientY - r.top)  / r.height - 0.5) * -10;
      const ry = ((e.clientX - r.left) / r.width  - 0.5) *  10;
      inner.style.transform = `translateY(-10px) rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    card.addEventListener('mouseleave', () => { inner.style.transform = ''; });
  });
}

/* ══════════════════════════════════════════
   SHUFFLE
══════════════════════════════════════════ */
function swap(incoming) {
  shuffleBtn.disabled = true;
  const existing = [...grid.querySelectorAll('.card')];

  existing.forEach((c, i) => setTimeout(() => c.classList.add('exit'), i * 55));

  setTimeout(() => {
    grid.innerHTML = '';
    renderItems(incoming);
    setTimeout(() => { shuffleBtn.disabled = false; }, 1100);
  }, existing.length * 55 + 320);
}

shuffleBtn.addEventListener('click', () => swap(getNextThree()));

/* ══════════════════════════════════════════
   ERA FILTER
══════════════════════════════════════════ */
document.getElementById('eraFilter').addEventListener('click', e => {
  const btn = e.target.closest('.era-btn');
  if (!btn) return;

  document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeEra = btn.dataset.era;

  swap(getNextThree());
});

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
document.getElementById('today-date').textContent =
  today.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });

renderItems(getNextThree());
</script>
