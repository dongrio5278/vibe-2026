<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODAY'S PICKS — 오늘의 패션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0c;
      --surface: #121212;
      --surface2: #181818;
      --border: #202020;
      --border-mid: #303030;
      --border-hi: #484848;
      --text-hi: #f0ede8;
      --text-mid: #888;
      --text-lo: #3e3e3e;
      --accent: #c8bfb0;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text-hi);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── MODAL ── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal-panel {
      background: var(--surface);
      border: 1px solid var(--border-mid);
      width: min(960px, 92vw);
      max-height: 88vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      transform: translateY(32px);
      transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .modal-backdrop.open .modal-panel { transform: translateY(0); }
    .modal-img-col {
      position: relative;
      overflow: hidden;
      min-height: 520px;
    }
    .modal-img-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      filter: grayscale(6%) contrast(1.05) brightness(0.93);
    }
    .modal-img-col::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 70%, var(--surface) 100%);
      pointer-events: none;
    }
    .modal-content-col {
      padding: 44px 40px 44px 36px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 18px;
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
      font-size: 16px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: border-color 0.2s, color 0.2s;
      outline: none;
    }
    .modal-close:hover { border-color: var(--border-hi); color: var(--text-hi); }
    .modal-cat-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-cat-badge {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border-mid);
      color: var(--text-mid);
    }
    .modal-type-badge {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-lo);
    }
    .modal-brand {
      font-size: 10px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--text-mid);
    }
    .modal-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 400;
      line-height: 1.15;
      color: var(--text-hi);
    }
    .modal-season {
      font-size: 9.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.6;
    }
    .modal-divider {
      width: 32px;
      height: 1px;
      background: var(--border-mid);
    }
    .modal-why-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-lo);
      margin-bottom: 10px;
    }
    .modal-why {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.15rem;
      line-height: 1.55;
      color: var(--accent);
    }
    .modal-desc {
      font-size: 13px;
      line-height: 1.95;
      color: #6e6e6e;
      word-break: keep-all;
    }
    .modal-desc strong { color: #aaa; font-weight: 500; }
    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .modal-tag {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 11px;
      border: 1px solid var(--border);
      color: var(--text-lo);
    }
    @media (max-width: 700px) {
      .modal-panel { grid-template-columns: 1fr; }
      .modal-img-col { min-height: 260px; max-height: 260px; }
      .modal-img-col::after { display: none; }
      .modal-content-col { padding: 28px 24px; }
    }

    /* ── HEADER ── */
    header {
      text-align: center;
      padding: 80px 20px 36px;
    }
    .site-eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--text-lo);
      margin-bottom: 16px;
    }
    .site-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5.5vw, 5.5rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      white-space: nowrap;
      color: var(--text-hi);
    }
    .site-title em { font-style: italic; color: var(--accent); }
    .site-meta {
      margin-top: 18px;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-lo);
    }

    /* ── FILTER ── */
    .filter-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
      margin-top: 36px;
      border: 1px solid var(--border);
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    .filter-btn {
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--text-lo);
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 11px 22px;
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      outline: none;
    }
    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { color: var(--text-mid); }
    .filter-btn.active {
      color: var(--accent);
      background: rgba(200,191,176,0.05);
    }

    /* ── SHUFFLE ── */
    .shuffle-wrap {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }
    .shuffle-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-lo);
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 11px 24px;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
      outline: none;
    }
    .shuffle-btn:hover { border-color: var(--border-mid); color: var(--text-mid); }
    .shuffle-btn:disabled { opacity: 0.3; pointer-events: none; }
    .shuffle-btn:hover .si { transform: rotate(180deg); }
    .si { font-size: 14px; display: inline-block; transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    /* ── DIVIDER ── */
    .rule {
      display: block;
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      margin: 0 auto 60px;
    }

    /* ── GRID ── */
    .picks-grid {
      max-width: 1480px;
      margin: 0 auto;
      padding: 0 44px 130px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
      perspective: 1400px;
      perspective-origin: 50% 30%;
      min-height: 300px;
    }

    /* ── CARD ── */
    .card {
      opacity: 0;
      transform: translateY(65px) rotateX(18deg) scale(0.96);
      transform-origin: center 80%;
      transform-style: preserve-3d;
      will-change: transform, opacity;
      transition:
        opacity 0.52s cubic-bezier(0.34,1.42,0.64,1),
        transform 0.52s cubic-bezier(0.34,1.42,0.64,1);
      cursor: pointer;
    }
    .card.snap { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
    .card.exit {
      opacity: 0 !important;
      transform: translateY(-24px) scale(0.95) !important;
      transition: opacity 0.26s ease, transform 0.26s ease !important;
    }
    .card-inner {
      border: 2px solid var(--border);
      background: var(--surface);
      transform-style: preserve-3d;
      transition: border-color 0.3s, transform 0.42s cubic-bezier(0.23,1,0.32,1), box-shadow 0.42s;
    }
    .card:hover .card-inner {
      border-color: var(--border-mid);
      transform: translateY(-10px) rotateX(-4deg) rotateY(2deg);
      box-shadow: 0 40px 90px rgba(0,0,0,0.7), 0 12px 30px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .card-header {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .card-brand {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-mid);
      margin-bottom: 8px;
    }
    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.28rem;
      font-weight: 400;
      line-height: 1.25;
      color: var(--text-hi);
    }
    .card-type {
      flex-shrink: 0;
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 4px 8px;
      border: 1px solid var(--border);
      color: var(--text-lo);
      margin-top: 2px;
      white-space: nowrap;
    }
    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 3/4;
      background: #080808;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transition: transform 0.85s cubic-bezier(0.16,1,0.3,1);
      filter: grayscale(8%) contrast(1.06) brightness(0.94);
    }
    .card:hover .card-img-wrap img { transform: scale(1.06); }
    .card-img-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 52%, rgba(0,0,0,0.38) 100%);
      pointer-events: none;
    }
    .card-num {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      z-index: 2;
    }
    .card-credit {
      position: absolute;
      bottom: 8px;
      right: 10px;
      font-size: 8px;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.28);
      z-index: 2;
      font-style: italic;
    }
    .card-read {
      position: absolute;
      bottom: 14px;
      left: 14px;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      z-index: 2;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.3s, transform 0.3s;
    }
    .card:hover .card-read { opacity: 1; transform: translateY(0); }
    .card-body { padding: 16px 22px 20px; }
    .card-season {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.55;
      margin-bottom: 8px;
    }
    .card-why {
      font-size: 12px;
      line-height: 1.6;
      color: #5a5a5a;
      word-break: keep-all;
      font-style: italic;
    }

    /* ── COUNTER ── */
    .counter {
      text-align: center;
      margin-top: -90px;
      margin-bottom: 90px;
      font-size: 9.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-lo);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px;
      border-top: 1px solid var(--border);
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-lo);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1020px) {
      .picks-grid { grid-template-columns: repeat(2,1fr); padding: 0 24px 100px; }
    }
    @media (max-width: 640px) {
      .picks-grid { grid-template-columns: 1fr; max-width: 440px; padding: 0 16px 80px; perspective: none; }
      .card { transform: translateY(50px) scale(0.97); }
      .card.snap { transform: translateY(0) scale(1); }
      .site-title { white-space: normal; font-size: clamp(2rem, 11vw, 3.5rem); }
    }
  </style>
</head>

/* ══════════════════════════
   STATE
══════════════════════════ */
const CATS   = ['all','cloth','accessory','icon'];
let activeCat = 'all';
const seeds  = {};
const cursors = {};

function seededShuffle(arr, seed) {
  const a = [...arr]; let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const today = new Date();
const daySeed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();

CATS.forEach(cat => {
  const indices = POOL
    .map((item, i) => ({item, i}))
    .filter(({item}) => cat === 'all' || item.cat === cat)
    .map(({i}) => i);
  seeds[cat]   = seededShuffle(indices, daySeed + (cat.charCodeAt(0)||0));
  cursors[cat] = 0;
});

/* diverse 3: avoid same type twice */
function getNextThree() {
  const pool = seeds[activeCat];
  const result = [];
  const usedTypes = new Set();
  let i = cursors[activeCat];
  let tries = 0;
  while (result.length < 3 && tries < pool.length) {
    const item = POOL[pool[i % pool.length]];
    if (!usedTypes.has(item.type) || result.length + (pool.length - tries) <= 3) {
      result.push(item);
      usedTypes.add(item.type);
    }
    i++; tries++;
  }
  cursors[activeCat] = i % pool.length;
  return result;
}

/* ══════════════════════════
   RENDER
══════════════════════════ */
const grid = document.getElementById('picksGrid');

function buildCard(item, num) {
  const lines = item.name.split('\n');
  const el = document.createElement('article');
  el.className = 'card';
  el.innerHTML = `
    <div class="card-inner">
      <div class="card-header">
        <div>
          <p class="card-brand">${item.brand}</p>
          <h2 class="card-name">${lines.join('<br>')}</h2>
        </div>
        <span class="card-type">${item.type}</span>
      </div>
      <div class="card-img-wrap">
        <img src="${item.img}" alt="${item.brand}" loading="lazy"/>
        <span class="card-num">0${num}</span>
        <span class="card-read">자세히 보기 →</span>
        ${item.credit ? `<span class="card-credit">${item.credit}</span>` : ''}
      </div>
      <div class="card-body">
        <p class="card-season">${item.season}</p>
        <p class="card-why">${item.why}</p>
      </div>
    </div>`;
  el.addEventListener('click', () => openModal(item));
  return el;
}

function snapIn(cards) {
  cards.forEach((card, i) => {
    grid.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => card.classList.add('snap'), i * 300 + 20));
  });
  attachTilt(cards);
}

function preloadNext() {
  const pool = seeds[activeCat];
  for (let i = 0; i < 3; i++) {
    const item = POOL[pool[(cursors[activeCat] + i) % pool.length]];
    const img = new Image();
    img.src = item.img;
  }
}

function renderItems(items) {
  snapIn(items.map((item, i) => buildCard(item, i + 1)));
  updateCounter();
  setTimeout(preloadNext, 800);
}

function updateCounter() {
  const pool = seeds[activeCat];
  const cur  = cursors[activeCat];
  const shown = cur === 0 ? pool.length : cur;
  document.getElementById('counter').textContent = `${shown} / ${pool.length} items viewed`;
}

/* ══════════════════════════
   MODAL
══════════════════════════ */
const backdrop = document.getElementById('modalBackdrop');

function openModal(item) {
  const lines = item.name.replace('\n', '<br>');
  document.getElementById('mImg').src    = item.img;
  document.getElementById('mImg').alt    = item.brand;
  document.getElementById('mCat').textContent     = item.cat;
  document.getElementById('mType').textContent    = item.type;
  document.getElementById('mBrand').textContent   = item.brand;
  document.getElementById('mName').innerHTML      = lines;
  document.getElementById('mSeason').textContent  = item.season;
  document.getElementById('mWhy').textContent     = item.why;
  document.getElementById('mDesc').innerHTML      = item.desc;
  document.getElementById('mTags').innerHTML      = item.tags.map(t=>`<span class="modal-tag">${t}</span>`).join('');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════
   TILT
══════════════════════════ */
function attachTilt(cards) {
  cards.forEach(card => {
    const inner = card.querySelector('.card-inner');
    card.addEventListener('mousemove', e => {
      const r  = card.getBoundingClientRect();
      const rx = ((e.clientY - r.top)  / r.height - 0.5) * -10;
      const ry = ((e.clientX - r.left) / r.width  - 0.5) *  10;
      inner.style.transform = `translateY(-10px) rotateX(${rx}deg) rotateY(${ry}deg)`;
    });
    card.addEventListener('mouseleave', () => { inner.style.transform = ''; });
  });
}

/* ══════════════════════════
   SHUFFLE
══════════════════════════ */
const shuffleBtn = document.getElementById('shuffleBtn');

function swap(incoming) {
  shuffleBtn.disabled = true;
  const existing = [...grid.querySelectorAll('.card')];
  existing.forEach((c, i) => setTimeout(() => c.classList.add('exit'), i * 55));
  setTimeout(() => {
    grid.innerHTML = '';
    renderItems(incoming);
    setTimeout(() => { shuffleBtn.disabled = false; }, 1100);
  }, existing.length * 55 + 310);
}

shuffleBtn.addEventListener('click', () => swap(getNextThree()));

/* ══════════════════════════
   FILTER
══════════════════════════ */
document.getElementById('filterRow').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCat = btn.dataset.cat;
  swap(getNextThree());
});

/* ══════════════════════════
   INIT
══════════════════════════ */
document.getElementById('todayDate').textContent =
  today.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric'});

renderItems(getNextThree());
</script>
